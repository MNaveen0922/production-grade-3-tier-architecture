name: Infrastructure — Terraform

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"

  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"

  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION:                  ${{ secrets.TF_VERSION }}
  AWS_REGION:                  ${{ secrets.AWS_REGION }}
  EKS_CLUSTER:                 ${{ secrets.EKS_CLUSTER }}
  TF_VAR_assets_bucket_suffix: ${{ secrets.TF_VAR_ASSETS_BUCKET_SUFFIX }}
  TF_VAR_alert_email:          ${{ secrets.TF_VAR_ALERT_EMAIL }}

jobs:
  iac-scan:
    name: Trivy IaC Scan (Terraform + Helm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Trivy config scan — Terraform
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          skip-dirs: charts,app
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy config scan — Helm chart
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: charts/enterprise-support
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_INFRA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_INFRA }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ secrets.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            const body = `### Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format   | \`${{ steps.fmt.outcome }}\` |
            | Init     | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | Plan     | \`${{ steps.plan.outcome }}\` |

            <details><summary>Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_INFRA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_INFRA }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ secrets.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER }}

      - name: Install / upgrade ALB Load Balancer Controller
        run: |
          VPC_ID=$(terraform output -raw vpc_id)
          ALB_ROLE_ARN=$(terraform output -raw alb_controller_role_arn)

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ secrets.EKS_CLUSTER }} \
            --set region=${{ secrets.AWS_REGION }} \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ALB_ROLE_ARN" \
            --set replicaCount=2 \
            --wait --timeout=300s

      - name: Verify ALB Controller is running
        run: |
          kubectl rollout status deployment/aws-load-balancer-controller \
            -n kube-system --timeout=120s


      - name: Install / upgrade kube-prometheus-stack (Prometheus + Grafana)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --set grafana.enabled=true \
            --set grafana.defaultDashboardsEnabled=true \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false \
            --wait --timeout=600s

      - name: Load custom Grafana dashboard
        run: |
          kubectl apply -f observability/grafana-dashboard-support-desk.yaml


      - name: Install / upgrade Argo CD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd --create-namespace \
            --set server.service.type=ClusterIP \
            --wait --timeout=600s

      - name: Apply Argo CD Project + Application (bootstrap GitOps)
        run: |
          kubectl apply -f argocd/project.yaml
          kubectl apply -f argocd/application.yaml
