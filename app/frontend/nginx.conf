# ============================================================
# nginx.conf
#
# PRODUCTION (EKS):
#   Upstream names match the Kubernetes Service names created
#   in k8s/*-deployment.yaml — CoreDNS resolves them cluster-internally.
#   auth-service:8001, ticket-service:8002, assign-service:8003
#
# Why proxy through Nginx?
#   The React app makes calls to /auth/*, /tickets/*, /assign/*.
#   Nginx forwards them to the right backend. No CORS issues,
#   no hardcoded backend URLs in the React bundle.
# ============================================================

upstream auth_backend {
    server auth-service:8001;
}

upstream ticket_backend {
    server ticket-service:8002;
}

upstream assign_backend {
    server assign-service:8003;
}

server {
    listen 80;
    server_name _;

    # Serve React build output
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────
    # ALB uses this to verify the container is alive.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Auth Service proxy ────────────────────────────────
    # Handles: /auth/signup, /auth/signin, /auth/health
    location /auth/ {
        proxy_pass         http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Ticket Service proxy ──────────────────────────────
    # Handles: /tickets, /tickets/<id>, /tickets/import, /tickets/health
    location /tickets {
        proxy_pass         http://ticket_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Assignment Service proxy ──────────────────────────
    # Handles: /assign, /assign/mytickets/<id>, /assign/health
    location /assign {
        proxy_pass         http://assign_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── React SPA — catch all ─────────────────────────────
    # Any URL not matched above returns index.html so React
    # Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;

        # Hashed JS/CSS filenames → safe to cache 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    application/xml text/xml;
}
