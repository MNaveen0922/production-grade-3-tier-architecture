---
# Source: enterprise-support/templates/cloudwatch-daemonset.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cwagentconfig
  namespace: amazon-cloudwatch
data:
  cwagentconfig.json: |
    {
      "agent": {
        "region": "us-east-1"
      },
      "logs": {
        "metrics_collected": {
          "kubernetes": {
            "cluster_name": "enterprise-support-prod-eks",
            "metrics_collection_interval": 60
          }
        },
        "force_flush_interval": 5
      }
    }
---
# Source: enterprise-support/templates/cloudwatch-daemonset.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # App service logs → /enterprise-support/prod/auth|ticket|assignment|frontend
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*enterprise-support*
        region              us-east-1
        log_group_name      /enterprise-support/prod/application
        log_stream_prefix   pod/
        auto_create_group   false

    # Worker logs → separate stream
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*worker*
        region              us-east-1
        log_group_name      /enterprise-support/prod/worker
        log_stream_prefix   worker/
        auto_create_group   false
